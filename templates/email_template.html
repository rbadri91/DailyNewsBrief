<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 680px;
      margin: 0 auto;
      padding: 20px;
      color: #222;
      line-height: 1.6;
    }
    h1 { font-size: 24px; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
    h2 { font-size: 18px; color: #333; margin-top: 32px; margin-bottom: 8px; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
    ul { padding-left: 20px; margin: 8px 0; }
    li { margin-bottom: 6px; }
    .error-box {
      background: #fff3cd;
      padding: 10px 14px;
      border-left: 4px solid #ffc107;
      margin: 20px 0;
      font-size: 13px;
    }
    .footer {
      font-size: 12px;
      color: #999;
      margin-top: 40px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <h1>Your Daily Brief &mdash; {{ date }}</h1>

  {{ digest | safe }}

  {% if errors %}
  <div class="error-box">
    <strong>Issues during fetch:</strong>
    <ul>{% for e in errors %}<li>{{ e }}</li>{% endfor %}</ul>
  </div>
  {% endif %}

  <div class="footer">
    This is an automated personal briefing. Stock information is for informational purposes only and does not constitute financial advice.
  </div>
</body>
</html>
